<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>

:root {
  --baseline: 12px;
  --font-size: 24px;
  --text-width: 520px;
  --cycle-time: 6000; /* 🔧 tempo totale ciclo (immagine + testo) */
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: white;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  overflow: hidden;
}

/* LAYOUT */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 100vh;
}

.col {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: calc(var(--baseline) * 4);
}

/* ================= IMAGE CINEMATIC ================= */

.image-wrapper {
  position: relative;
  width: 100%;
  max-width: 420px;
  aspect-ratio: 4 / 5;
  overflow: hidden;
  background: white;
}

/* cinematic feel */
.img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;

  opacity: 0;
  transform: scale(1.05);

  transition:
    opacity 1.4s ease-in-out,
    transform 1.8s ease-in-out;
}

.img.active {
  opacity: 1;
  transform: scale(1);
}

/* ================= TEXT ================= */

.text {
  width: 100%;
  max-width: var(--text-width);

  font-size: var(--font-size);
  line-height: 1.4;

  text-align: justify;
  text-align-last: left;
}

.word {
  white-space: nowrap;
}

.char {
  display: inline-block;
}

/* ================= MOBILE ================= */

@media (max-width: 768px) {
  .container {
    grid-template-columns: 1fr;
  }
}

</style>
</head>

<body>

<div class="container">

  <!-- IMAGE -->
  <div class="col">
    <div class="image-wrapper">
      <img id="imgA" class="img active">
      <img id="imgB" class="img">
    </div>
  </div>

  <!-- TEXT -->
  <div class="col">
    <div id="text" class="text"></div>
  </div>

</div>

<script>

/* ================= DATA ================= */

const images = [
  "images/image1.webp",
  "images/image2.webp"
  // poi: image3.webp ... image10.webp
];

const texts = [
  "La periferia è un linguaggio che si scrive da solo nel tempo.",
  "Il corpo digitale perde peso quando viene osservato troppo a lungo.",
  "Ogni immagine è un errore che insiste nel diventare memoria.",
  "La realtà non si interrompe ma cambia frequenza di lettura.",
  "Non esiste un inizio solo una sequenza che decide di ripetersi.",
  "Il sistema genera significato quando inizia a corrodersi."
];

/* ================= CONFIG ================= */

const CYCLE_TIME = 6000;     // 🔧 sync totale
const MORPH_RATIO = 0.7;      // 🔧 quando inizia morph testo (0–1)

/* ================= STATE ================= */

let index = 0;
let nextIndex = 1;

let currentImage = 0;
let lastImage = 0;

let chars = [];
let fromText = "";
let toText = "";

let phaseStart = performance.now();

/* ================= IMAGE SYSTEM ================= */

function getNextIndex(max, current) {
  let i;
  do {
    i = Math.floor(Math.random() * max);
  } while (i === current);
  return i;
}

function setImage(i) {

  const a = document.getElementById("imgA");
  const b = document.getElementById("imgB");

  const next = images[i];

  const active = a.classList.contains("active") ? a : b;
  const inactive = active === a ? b : a;

  inactive.src = next;

  inactive.classList.add("active");
  active.classList.remove("active");

  currentImage = i;
}

/* ================= TEXT SYSTEM ================= */

function build(text) {

  const el = document.getElementById("text");
  el.innerHTML = "";

  chars = [];

  const words = text.split(" ");

  words.forEach(word => {

    const w = document.createElement("span");
    w.className = "word";

    [...word].forEach(l => {

      const c = document.createElement("span");
      c.className = "char";
      c.textContent = l;

      chars.push(c);
      w.appendChild(c);
    });

    el.appendChild(w);
    el.appendChild(document.createTextNode(" "));
  });
}

function normalize(a, b) {

  const max = Math.max(a.length, b.length);

  while (a.length < max) a += " ";
  while (b.length < max) b += " ";

  return [a, b];
}

function morph(t) {

  for (let i = 0; i < chars.length; i++) {

    const a = fromText[i] || " ";
    const b = toText[i] || " ";

    chars[i].textContent = (t > i / chars.length) ? b : a;
  }
}

/* ================= SYNC CYCLE ================= */

function cycle(now) {

  const elapsed = now - phaseStart;

  const progress = elapsed / CYCLE_TIME;

  /* ================= IMAGE CHANGE ================= */
  if (progress >= 1) {

    phaseStart = now;

    lastImage = currentImage;
    currentImage = getNextIndex(images.length, currentImage);

    setImage(currentImage);

    /* TEXT INDEX */
    index = nextIndex;
    nextIndex = (nextIndex + 1) % texts.length;

    const norm = normalize(texts[index], texts[nextIndex]);

    fromText = norm[0];
    toText = norm[1];

    build(fromText);
  }

  /* ================= TEXT MORPH ================= */

  if (progress > MORPH_RATIO) {

    const t = (progress - MORPH_RATIO) / (1 - MORPH_RATIO);
    morph(t > 1 ? 1 : t);
  }

  requestAnimationFrame(cycle);
}

/* ================= INIT ================= */

function init() {

  currentImage = Math.floor(Math.random() * images.length);
  document.getElementById("imgA").src = images[currentImage];
  document.getElementById("imgA").classList.add("active");

  index = Math.floor(Math.random() * texts.length);
  fromText = texts[index];

  build(fromText);

  phaseStart = performance.now();

  requestAnimationFrame(cycle);
}

init();

</script>

</body>
</html>
