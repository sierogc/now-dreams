<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Split Responsive Project</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: white;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      color: black;
    }

    /* SPLIT DESKTOP */
    .container {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    .left,
    .right {
      width: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    /* IMMAGINE */
    .left img {
      max-width: 85%;
      max-height: 85%;
      object-fit: contain;
      display: block;
    }

    /* TESTO */
    .text {
      width: 80%;
    }

    h1 {
      font-weight: 400;
      font-size: 28px;
      margin-bottom: 16px;
    }

    p {
      font-weight: 400;
      font-size: 16px;
      line-height: 1.5;
    }

    /* 📱 RESPONSIVE */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .left,
      .right {
        width: 100%;
        height: 50vh;
        padding: 20px;
      }

      .left img {
        max-width: 90%;
        max-height: 90%;
      }

      .text {
        width: 90%;
        text-align: center;
      }
    }

    /* schermi molto grandi */
    @media (min-width: 1600px) {
      h1 {
        font-size: 34px;
      }

      p {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LEFT -->
    <div class="left">
      <img src="images/image1.jpg" alt="immagine progetto" />
    </div>

    <!-- RIGHT -->
    <div class="right">
      <div class="text">
        <h1>Titolo progetto</h1>
        <p>
          Testo del progetto. Layout split screen perfettamente bilanciato su desktop,
          e adattivo su mobile con stacking verticale.
        </p>
      </div>
    </div>

  </div>

</body>
</html>
