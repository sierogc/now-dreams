<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progetto Web Dinamico</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff; /* Sfondo bianco */
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #000000; /* Testo nero */
            overflow-x: hidden;
        }

        .container {
            display: flex;
            min-height: 100vh;
            width: 100vw;
        }

        /* Metà sinistra per le immagini */
        .left-half {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .slideshow-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .slideshow-img.active {
            opacity: 1;
        }

        /* Metà destra per il testo */
        .right-half {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px;
        }

        .text-content {
            font-size: 2rem;
            line-height: 1.4;
            max-width: 85%;
            word-wrap: break-word;
        }

        /* Design per smartphone */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .left-half, .right-half {
                height: 50vh;
            }
            .right-half {
                padding: 20px;
            }
            .text-content {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-half" id="image-container">
            <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=800&auto=format&fit=crop" class="slideshow-img active" alt="Immagine 1">
            <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=800&auto=format&fit=crop" class="slideshow-img" alt="Immagine 2">
            <img src="https://images.unsplash.com/photo-1506744626753-dba7e41d7b69?q=80&w=800&auto=format&fit=crop" class="slideshow-img" alt="Immagine 3">
        </div>

        <div class="right-half">
            <div class="text-content" id="scramble-text">
                Questo è il tuo testo iniziale. Le lettere di ogni singola parola continueranno a scambiarsi di posto creando un effetto visivo caotico ma affascinante.
            </div>
        </div>
    </div>
    
    <script>
        // --- 1. Gestione Slideshow Immagini ---
        const images = document.querySelectorAll('.slideshow-img');
        let currentImageIndex = 0;

        function changeImage() {
            images[currentImageIndex].classList.remove('active');
            currentImageIndex = (currentImageIndex + 1) % images.length;
            images[currentImageIndex].classList.add('active');
        }

        // Cambia immagine ogni 3000 ms (3 secondi)
        setInterval(changeImage, 3000);


        // --- 2. Gestione Effetto Testo ---
        const textElement = document.getElementById('scramble-text');
        const originalText = textElement.innerText;
        
        // Separa le parole dalla punteggiatura per non mescolare gli spazi
        const tokens = originalText.match(/(\w+)|(\W+)/g);

        // Funzione per mescolare i caratteri
        function shuffleString(str) {
            let arr = str.split('');
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr.join('');
        }

        function scrambleText() {
            const scrambledTokens = tokens.map(token => {
                // Mescola solo se è una parola (più lunga di 1 lettera)
                if (/\w+/.test(token) && token.length > 1) {
                    return shuffleString(token);
                }
                return token;
            });
            textElement.innerText = scrambledTokens.join('');
        }

        // Mescola le lettere ogni 200 ms
        setInterval(scrambleText, 200);
    </script>

</body>
</html>
