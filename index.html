<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
:root {
  --baseline: 12px;
  --font-size: 24px;
  --line-height: 3;
  --text-width: 520px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: white;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 100vh;
}

.col {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: calc(var(--baseline) * 4);
}

.image {
  width: 100%;
  max-width: 420px;
  aspect-ratio: 4/5;
  object-fit: cover;
}

.text {
  width: 100%;
  max-width: var(--text-width);

  font-size: var(--font-size);
  line-height: calc(var(--baseline) * var(--line-height));

  text-align: justify;
  text-align-last: left;

  word-break: keep-all;
  overflow-wrap: normal;
  hyphens: none;
}

.word {
  white-space: nowrap;
}

.char {
  display: inline-block;
}

@media (max-width: 768px) {
  .container {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="col">
    <img src="images/image1.webp" class="image"/>
  </div>
  <div class="col">
    <div id="text" class="text"></div>
  </div>
</div>

<script>

/* ================= TESTI ================= */
const texts = [
  "La periferia è un linguaggio che si scrive da solo nel tempo.",
  "Il corpo digitale perde peso quando viene osservato troppo a lungo.",
  "Ogni immagine è un errore che insiste nel diventare memoria.",
  "La realtà non si interrompe ma cambia frequenza di lettura.",
  "Non esiste un inizio solo una sequenza che decide di ripetersi.",
  "Il sistema genera significato quando inizia a corrodersi."
];

/* ================= PARAMETRI ================= */
const WAIT_TIME = 6000;
const MORPH_TIME = 8000;

/* ================= STATO ================= */
let current = -1;
let previous = -1;

let phase = "wait";
let waitStart = performance.now();
let morphStart = 0;

let fromWords = [];
let toWords = [];

let wordSpans = [];

/* ================= RANDOM ================= */
function getNextIndex() {
  let i;
  do {
    i = Math.floor(Math.random() * texts.length);
  } while (i === current || i === previous);
  return i;
}

/* ================= NORMALIZE WORDS ================= */
function normalizeWords(a, b) {
  const A = a.split(" ");
  const B = b.split(" ");

  const max = Math.max(A.length, B.length);

  while (A.length < max) A.push("");
  while (B.length < max) B.push("");

  return [A, B];
}

/* ================= BUILD DOM ================= */
function buildDOM(words) {
  const container = document.getElementById("text");
  container.innerHTML = "";

  wordSpans = [];

  words.forEach(word => {

    const wordEl = document.createElement("span");
    wordEl.className = "word";

    const chars = [];

    [...word].forEach(letter => {
      const charEl = document.createElement("span");
      charEl.className = "char";
      charEl.textContent = letter;

      chars.push(charEl);
      wordEl.appendChild(charEl);
    });

    wordSpans.push(chars);

    container.appendChild(wordEl);
    container.appendChild(document.createTextNode(" "));
  });
}

/* ================= MORPH ================= */
function updateMorph(progress) {

  wordSpans.forEach((chars, i) => {

    const from = fromWords[i];
    const to = toWords[i];

    const maxLen = Math.max(from.length, to.length);

    for (let j = 0; j < maxLen; j++) {

      if (!chars[j]) continue;

      const fromChar = from[j] || "";
      const toChar = to[j] || "";

      chars[j].textContent =
        (progress >= (j / maxLen)) ? toChar : fromChar;
    }
  });
}

/* ================= LOOP ================= */
function loop(now) {

  if (phase === "wait") {

    if (now - waitStart > WAIT_TIME) {

      phase = "morph";
      morphStart = now;

      previous = current;
      current = getNextIndex();

      const [A, B] = normalizeWords(
        texts[previous === -1 ? current : previous],
        texts[current]
      );

      fromWords = A;
      toWords = B;

      buildDOM(fromWords);
    }
  }

  if (phase === "morph") {

    let progress = (now - morphStart) / MORPH_TIME;
    if (progress > 1) progress = 1;

    updateMorph(progress);

    if (progress === 1) {
      phase = "wait";
      waitStart = now;
    }
  }

  requestAnimationFrame(loop);
}

/* ================= INIT ================= */
function init() {
  current = getNextIndex();
  fromWords = texts[current].split(" ");
  buildDOM(fromWords);

  waitStart = performance.now();
  requestAnimationFrame(loop);
}

init();

</script>

</body>
</html>
