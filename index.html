<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Now, dreams</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff;
            /* Font SF Pro Regular tramite system fonts */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            color: #000000;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            display: flex;
            min-height: 100vh;
            width: 100vw;
        }

        /* Metà sinistra: Immagini */
        .left-half {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .slideshow-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            /* Transizione rapida per seguire il ritmo di 0.9s */
            transition: opacity 0.2s ease-in-out; 
        }

        .slideshow-img.active {
            opacity: 1;
        }

        /* Metà destra: Testo */
        .right-half {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }

        .text-content {
            font-size: 2.2rem;
            line-height: 1.4;
            max-width: 90%;
            font-weight: 400; /* Regular */
            letter-spacing: -0.02em;
            text-align: left;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .left-half, .right-half { height: 50vh; }
            .right-half { padding: 30px; }
            .text-content { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-half" id="image-container">
            <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=800" class="slideshow-img active">
            <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=800" class="slideshow-img">
            <img src="https://images.unsplash.com/photo-1506744626753-dba7e41d7b69?q=80&w=800" class="slideshow-img">
            <img src="https://images.unsplash.com/photo-1633167606207-d840b5070fc2?q=80&w=800" class="slideshow-img">
        </div>

        <div class="right-half">
            <div class="text-content" id="scramble-text">
                Il progetto esplora l'instabilità della forma attraverso il linguaggio. Le parole mutano ma mantengono la loro essenza visiva, alternando ordine e caos in un loop continuo.
            </div>
        </div>
    </div>
    
    <script>
        // --- SLIDESHOW VELOCE (0.9 secondi) ---
        const images = document.querySelectorAll('.slideshow-img');
        let currentImg = 0;

        function rotateImages() {
            images[currentImg].classList.remove('active');
            currentImg = (currentImg + 1) % images.length;
            images[currentImg].classList.add('active');
        }
        setInterval(rotateImages, 900); // Cambio ogni 0.9s


        // --- TESTO DINAMICO ---
        const textElement = document.getElementById('scramble-text');
        const originalText = textElement.innerText;
        const tokens = originalText.match(/(\w+)|(\W+)/g);

        function shuffle(str) {
            let a = str.split("");
            for(let i = a.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a.join("");
        }

        function animateText() {
            // Probabilità: 80% testo corretto, 20% rimescolato
            const showCorrect = Math.random() > 0.2;

            if (showCorrect) {
                textElement.innerText = originalText;
            } else {
                const scrambled = tokens.map(t => {
                    if (/\w+/.test(t) && t.length > 3) {
                        return shuffle(t);
                    }
                    return t;
                }).join("");
                textElement.innerText = scrambled;
            }
        }

        // Velocità del testo: aggiorna ogni 1.2 secondi per non essere troppo frenetico
        // ma mantenere la "giusta posizione" ben visibile.
        setInterval(animateText, 1200);
    </script>

</body>
</html>
