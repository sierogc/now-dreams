<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generative Morph System</title>

  <link rel="preload" as="image" href="images/image1.webp">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: white;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      color: black;
    }

    .container {
      display: flex;
      width: 100vw;
      min-height: 100vh;
    }

    .left,
    .right {
      width: 50%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px;
    }

    /* IMAGE */
    .left img {
      width: 100%;
      max-width: 420px;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      display: block;
    }

    /* TEXT */
    .text {
      width: 80%;
      text-align: justify;
      font-size: 24px;
      line-height: 1.5;
      font-weight: 400;
    }

    .word {
      display: inline-block;
      white-space: pre;
    }

    .char {
      display: inline-block;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .left,
      .right {
        width: 100%;
        padding: 20px;
      }

      .left img {
        max-width: 90%;
      }

      .text {
        width: 90%;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LEFT TEXT -->
  <div class="left">
    <div id="text" class="text"></div>
  </div>

  <!-- RIGHT IMAGE -->
  <div class="right">
    <img src="images/image1.webp" alt="immagine progetto" />
  </div>

</div>

<script>
/* -----------------------------
   TEXTS
------------------------------*/
const texts = [
  "La periferia è un linguaggio che si scrive da solo nel tempo.",
  "Il corpo digitale perde peso quando viene osservato troppo a lungo.",
  "Ogni immagine è un errore che insiste nel diventare memoria.",
  "La realtà non si interrompe ma cambia frequenza di lettura.",
  "Non esiste un inizio solo una sequenza che decide di ripetersi.",
  "Il sistema genera significato quando inizia a corrodersi."
];

let currentIndex = -1;
let previousIndex = -1;

/* -----------------------------
   INIT RANDOM
------------------------------*/
function getNextIndex() {
  let i;
  do {
    i = Math.floor(Math.random() * texts.length);
  } while (i === currentIndex || i === previousIndex);
  return i;
}

/* -----------------------------
   BUILD TEXT STRUCTURE
------------------------------*/
function buildText(text) {
  const container = document.getElementById("text");
  container.innerHTML = "";

  const words = text.split(" ");

  words.forEach(word => {
    const wordSpan = document.createElement("span");
    wordSpan.className = "word";

    [...word].forEach(letter => {
      const charSpan = document.createElement("span");
      charSpan.className = "char";
      charSpan.textContent = letter;
      wordSpan.appendChild(charSpan);
    });

    container.appendChild(wordSpan);
    container.appendChild(document.createTextNode(" "));
  });
}

/* -----------------------------
   FLUID MORPH (NO SYMBOLS)
------------------------------*/
function morphTo(newText) {
  const container = document.getElementById("text");

  const oldChars = Array.from(container.querySelectorAll(".char"));
  const newWords = newText.split(" ");

  const newCharsFlat = newWords.join(" ").split("");

  const maxLen = Math.max(oldChars.length, newCharsFlat.length);

  let frame = 0;
  const steps = 22; // via di mezzo A/B

  const interval = setInterval(() => {
    for (let i = 0; i < maxLen; i++) {

      const oldChar = oldChars[i];
      const newChar = newCharsFlat[i] || " ";

      const progress = frame / steps;

      if (!oldChar) continue;

      // probabilità di switch graduale
      if (Math.random() < progress) {
        oldChar.textContent = newChar;
      }
    }

    frame++;

    if (frame > steps) {
      clearInterval(interval);
      buildText(newText);
    }

  }, 60);
}

/* -----------------------------
   INIT
------------------------------*/
function init() {
  currentIndex = getNextIndex();
  buildText(texts[currentIndex]);
}

/* -----------------------------
   LOOP
------------------------------*/
function changeText() {
  previousIndex = currentIndex;
  currentIndex = getNextIndex();

  morphTo(texts[currentIndex]);
}

/* -----------------------------
   START
------------------------------*/
init();
setInterval(changeText, 15000);
</script>

</body>
</html>
