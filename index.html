<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
:root {
  --baseline: 12px;
  --font-size: 24px;
  --line-height: 3;
  --text-width: 520px;
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: white;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
}

/* LAYOUT */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 100vh;
}

.col {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: calc(var(--baseline) * 4);
}

/* IMAGE */
.image {
  width: 100%;
  max-width: 420px;
  aspect-ratio: 4/5;
  object-fit: cover;
}

/* TEXT */
.text {
  width: 100%;
  max-width: var(--text-width);

  font-size: var(--font-size);
  line-height: calc(var(--baseline) * var(--line-height));

  text-align: justify;
  text-align-last: left;
}

/* CHAR */
.char {
  display: inline-block;
  transition: color 0.15s linear;
}

.word {
  white-space: nowrap;
}

/* MOBILE */
@media (max-width: 768px) {
  .container {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="col">
    <img src="images/image1.webp" class="image">
  </div>

  <div class="col">
    <div id="text" class="text"></div>
  </div>

</div>

<script>

/* ================= TEXTS ================= */
const texts = [
  "La periferia è un linguaggio che si scrive da solo nel tempo.",
  "Il corpo digitale perde peso quando viene osservato troppo a lungo.",
  "Ogni immagine è un errore che insiste nel diventare memoria.",
  "La realtà non si interrompe ma cambia frequenza di lettura.",
  "Non esiste un inizio solo una sequenza che decide di ripetersi.",
  "Il sistema genera significato quando inizia a corrodersi."
];

/* ================= PARAMS ================= */
const WAIT_TIME = 6000;     // pausa tra testi
const MORPH_TIME = 9000;    // durata morph (più alto = più fluido)

/* ================= STATE ================= */
let current = 0;
let next = 1;

let from = "";
let to = "";

let chars = [];

/* ================= BUILD ================= */
function build(text) {

  const el = document.getElementById("text");
  el.innerHTML = "";

  chars = [];

  const words = text.split(" ");

  words.forEach(word => {

    const wordEl = document.createElement("span");
    wordEl.className = "word";

    [...word].forEach(letter => {

      const c = document.createElement("span");
      c.className = "char";
      c.textContent = letter;

      chars.push(c);
      wordEl.appendChild(c);
    });

    el.appendChild(wordEl);
    el.appendChild(document.createTextNode(" "));
  });
}

/* ================= NORMALIZE ================= */
function normalize(a, b) {

  const max = Math.max(a.length, b.length);

  while (a.length < max) a += " ";
  while (b.length < max) b += " ";

  return [a, b];
}

/* ================= CLEAN MORPH ================= */
function updateMorph(t) {

  for (let i = 0; i < chars.length; i++) {

    const a = from[i] || " ";
    const b = to[i] || " ";

    const shouldChange = t > (i / chars.length);

    chars[i].textContent = shouldChange ? b : a;
  }
}

/* ================= LOOP ================= */
let phase = "wait";
let start = performance.now();

function loop(now) {

  if (phase === "wait") {

    if (now - start > WAIT_TIME) {

      phase = "morph";
      start = now;

      current = next;
      next = (next + 1) % texts.length;

      const norm = normalize(texts[current], texts[next]);

      from = norm[0];
      to = norm[1];

      build(from);
    }
  }

  if (phase === "morph") {

    let t = (now - start) / MORPH_TIME;
    if (t > 1) t = 1;

    updateMorph(t);

    if (t === 1) {
      phase = "wait";
      start = now;
    }
  }

  requestAnimationFrame(loop);
}

/* ================= INIT ================= */
function init() {
  from = texts[0];
  build(from);
  requestAnimationFrame(loop);
}

init();

</script>

</body>
</html>
