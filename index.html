<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Continuous Morph System</title>

  <link rel="preload" as="image" href="images/image1.webp">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: white;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      color: black;
    }

    .container {
      display: flex;
      width: 100vw;
      min-height: 100vh;
    }

    /* IMAGE LEFT */
    .left {
      width: 50%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px;
    }

    .left img {
      width: 100%;
      max-width: 420px;
      aspect-ratio: 4 / 5;
      object-fit: cover;
    }

    /* TEXT RIGHT */
    .right {
      width: 50%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px;
    }

    .text {
      width: 80%;
      font-size: 24px;
      line-height: 1.5;

      text-align: justify;
      text-align-last: left;
    }

    .char {
      display: inline-block;
      white-space: pre;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .left,
      .right {
        width: 100%;
        padding: 20px;
      }

      .left img {
        max-width: 90%;
      }

      .text {
        width: 90%;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="left">
    <img src="images/image1.webp" />
  </div>

  <div class="right">
    <div id="text" class="text"></div>
  </div>

</div>

<script>

/* ---------------- TEXTS ---------------- */
const texts = [
  "La periferia è un linguaggio che si scrive da solo nel tempo.",
  "Il corpo digitale perde peso quando viene osservato troppo a lungo.",
  "Ogni immagine è un errore che insiste nel diventare memoria.",
  "La realtà non si interrompe ma cambia frequenza di lettura.",
  "Non esiste un inizio solo una sequenza che decide di ripetersi.",
  "Il sistema genera significato quando inizia a corrodersi."
];

/* ---------------- STATE ---------------- */
let current = -1;
let previous = -1;

let phase = "wait";
let waitStart = performance.now();

let morphStart = 0;

const WAIT_TIME = 6000;
const MORPH_TIME = 6000; // 🔥 più lento

let fromText = [];
let toText = [];

/* ---------------- SAFE PICK ---------------- */
function getNextIndex() {
  let i;
  do {
    i = Math.floor(Math.random() * texts.length);
  } while (i === current || i === previous);
  return i;
}

/* ---------------- NORMALIZE TEXT ---------------- */
function normalize(a, b) {
  const max = Math.max(a.length, b.length);

  const A = a.split("");
  const B = b.split("");

  while (A.length < max) A.push(" ");
  while (B.length < max) B.push(" ");

  return [A, B];
}

/* ---------------- RENDER ---------------- */
function render(textArr) {
  const el = document.getElementById("text");
  el.innerHTML = "";

  textArr.forEach(ch => {
    const span = document.createElement("span");
    span.className = "char";
    span.textContent = ch;
    el.appendChild(span);
  });
}

/* ---------------- CONTINUOUS MORPH ---------------- */
function updateMorph(progress) {
  const chars = document.querySelectorAll(".char");

  chars.forEach((el, i) => {
    const from = fromText[i];
    const to = toText[i];

    if (progress >= 1) {
      el.textContent = to;
    } else {
      // progress continuo senza random
      el.textContent = (progress < (i / chars.length)) ? from : to;
    }
  });
}

/* ---------------- LOOP ---------------- */
function loop(now) {

  if (phase === "wait") {

    if (now - waitStart > WAIT_TIME) {

      phase = "morph";
      morphStart = now;

      previous = current;
      current = getNextIndex();

      const old = texts[previous === -1 ? current : previous];
      const next = texts[current];

      const norm = normalize(old, next);

      fromText = norm[0];
      toText = norm[1];

      render(fromText);
    }
  }

  if (phase === "morph") {

    let progress = (now - morphStart) / MORPH_TIME;
    if (progress > 1) progress = 1;

    updateMorph(progress);

    if (progress === 1) {
      phase = "wait";
      waitStart = now;
    }
  }

  requestAnimationFrame(loop);
}

/* ---------------- INIT ---------------- */
function init() {
  current = getNextIndex();
  render(texts[current].split(""));
  waitStart = performance.now();
  requestAnimationFrame(loop);
}

init();

</script>

</body>
</html>
