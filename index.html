<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Split Screen Project</title>

  <!-- ⚡ PRELOAD IMMAGINI (performance) -->
  <link rel="preload" as="image" href="images/image1.webp">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: white;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      color: black;
    }

    /* SPLIT LAYOUT */
    .container {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    /* LEFT IMAGE SIDE */
    .left {
      width: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .left img {
      width: 100%;
      max-width: 420px;        /* controllo editoriale */
      aspect-ratio: 4 / 5;     /* formato fisso coerente */
      object-fit: cover;       /* ritaglio pulito */
      display: block;
    }

    /* RIGHT TEXT SIDE */
    .right {
      width: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .text {
      width: 80%;
    }

    h1 {
      font-weight: 400;
      font-size: 28px;
      margin-bottom: 16px;
    }

    p {
      font-weight: 400;
      font-size: 16px;
      line-height: 1.5;
    }

    /* 📱 MOBILE */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .left,
      .right {
        width: 100%;
        height: 50vh;
        padding: 20px;
      }

      .left img {
        max-width: 90%;
      }

      .text {
        width: 90%;
        text-align: center;
      }
    }

    /* 🖥️ LARGE SCREENS */
    @media (min-width: 1600px) {
      h1 {
        font-size: 34px;
      }

      p {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LEFT: IMAGE -->
    <div class="left">
      <img src="images/image1.jpg" alt="immagine progetto" />
    </div>

    <!-- RIGHT: TEXT -->
    <div class="right">
      <div class="text">
        <h1>Titolo progetto</h1>
        <p>
          Testo del progetto. Layout split screen pulito, coerente e responsive.
          L’immagine mantiene sempre un rapporto 4:5 e si comporta come un elemento editoriale.
        </p>
      </div>
    </div>

  </div>

</body>
</html>
