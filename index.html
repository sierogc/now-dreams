<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Split Screen Project</title>

  <!-- preload immagine -->
  <link rel="preload" as="image" href="images/image1.webp">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: white;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      color: black;
    }

    /* CONTAINER */
    .container {
      display: flex;
      width: 100vw;
      min-height: 100vh;
    }

    /* TOP ALIGN */
    .left,
    .right {
      width: 50%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px;
    }

    /* LEFT IMAGE */
    .left img {
      width: 100%;
      max-width: 420px;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      display: block;
    }

    /* RIGHT TEXT */
    .text {
      width: 80%;
      text-align: justify; /* ✔ giustificato */
    }

    p {
      font-weight: 400;
      font-size: 24px;
      line-height: 1.5;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .left,
      .right {
        width: 100%;
        padding: 20px;
      }

      .left img {
        max-width: 90%;
      }

      .text {
        width: 90%;
      }
    }

    /* LARGE SCREENS */
    @media (min-width: 1600px) {
      p {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LEFT -->
    <div class="left">
      <img src="images/image1.webp" alt="immagine progetto" />
    </div>

    <!-- RIGHT -->
    <div class="right">
      <div class="text">
        <p>
          Testo del progetto senza titolo, solo corpo. Il layout mantiene una struttura editoriale pulita,
          con allineamento top tra immagine e testo e una composizione tipografica giustificata.
        </p>
      </div>
    </div>

  </div>

</body>
</html>
