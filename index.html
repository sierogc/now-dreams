<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root {
  --baseline: 12px;
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: white;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  color: black;
}

/* LAYOUT */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 100vh;
}

/* COLUMN BASE */
.col {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: calc(var(--baseline) * 4); /* 48px */
}

/* IMAGE */
.image {
  width: 100%;
  max-width: 420px;
  aspect-ratio: 4 / 5;
  object-fit: cover;

  /* allineamento alla griglia */
  margin-top: calc(var(--baseline) * 0);
}

/* TEXT */
.text {
  width: 100%;
  max-width: 520px;

  font-size: 24px;
  line-height: calc(var(--baseline) * 3); /* 36px */

  text-align: justify;
  text-align-last: left;

  /* 🔥 blocca rottura parole */
  word-break: keep-all;
  overflow-wrap: normal;
  hyphens: none;
}

/* WORD + CHAR */
.word {
  white-space: nowrap;
}

.char {
  display: inline-block;
}

/* MOBILE */
@media (max-width: 768px) {
  .container {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="col">
    <img src="images/image1.webp" class="image">
  </div>

  <div class="col">
    <div id="text" class="text"></div>
  </div>

</div>

<script>

/* ---------------- TEXTS ---------------- */
const texts = [
  "La periferia è un linguaggio che si scrive da solo nel tempo.",
  "Il corpo digitale perde peso quando viene osservato troppo a lungo.",
  "Ogni immagine è un errore che insiste nel diventare memoria.",
  "La realtà non si interrompe ma cambia frequenza di lettura.",
  "Non esiste un inizio solo una sequenza che decide di ripetersi.",
  "Il sistema genera significato quando inizia a corrodersi."
];

/* ---------------- STATE ---------------- */
let current = -1;
let previous = -1;

let phase = "wait";
let waitStart = performance.now();
let morphStart = 0;

const WAIT_TIME = 6000;
const MORPH_TIME = 7000; // ancora più lento

let fromWords = [];
let toWords = [];

/* ---------------- RANDOM ---------------- */
function getNextIndex() {
  let i;
  do {
    i = Math.floor(Math.random() * texts.length);
  } while (i === current || i === previous);
  return i;
}

/* ---------------- BUILD ---------------- */
function build(words) {
  const el = document.getElementById("text");
  el.innerHTML = "";

  words.forEach(word => {
    const w = document.createElement("span");
    w.className = "word";

    [...word].forEach(letter => {
      const c = document.createElement("span");
      c.className = "char";
      c.textContent = letter;
      w.appendChild(c);
    });

    el.appendChild(w);
    el.appendChild(document.createTextNode(" "));
  });
}

/* ---------------- NORMALIZE ---------------- */
function normalize(a, b) {
  const A = a.split(" ");
  const B = b.split(" ");

  const max = Math.max(A.length, B.length);

  while (A.length < max) A.push("");
  while (B.length < max) B.push("");

  return [A, B];
}

/* ---------------- MORPH ---------------- */
function updateMorph(progress) {
  const words = document.querySelectorAll(".word");

  words.forEach((wordEl, i) => {
    const from = fromWords[i];
    const to = toWords[i];

    const chars = wordEl.querySelectorAll(".char");

    for (let j = 0; j < Math.max(from.length, to.length); j++) {
      if (!chars[j]) continue;

      if (progress > (j / (to.length || 1))) {
        chars[j].textContent = to[j] || "";
      }
    }
  });
}

/* ---------------- LOOP ---------------- */
function loop(now) {

  if (phase === "wait") {
    if (now - waitStart > WAIT_TIME) {
      phase = "morph";
      morphStart = now;

      previous = current;
      current = getNextIndex();

      const [A, B] = normalize(
        texts[previous === -1 ? current : previous],
        texts[current]
      );

      fromWords = A;
      toWords = B;

      build(fromWords);
    }
  }

  if (phase === "morph") {
    let progress = (now - morphStart) / MORPH_TIME;
    if (progress > 1) progress = 1;

    updateMorph(progress);

    if (progress === 1) {
      phase = "wait";
      waitStart = now;
    }
  }

  requestAnimationFrame(loop);
}

/* ---------------- INIT ---------------- */
function init() {
  current = getNextIndex();
  build(texts[current].split(" "));
  waitStart = performance.now();
  requestAnimationFrame(loop);
}

init();

</script>

</body>
</html>
