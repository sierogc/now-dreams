<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>

/* =======================
   CONFIG
======================= */

:root {
  --font-size: 24px;
  --text-width: 520px;
  --cycle: 6000; /* 🔧 tempo totale ciclo */
}

/* =======================
   RESET
======================= */

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: white;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  overflow: hidden;
}

/* =======================
   LAYOUT
======================= */

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 100vh;
}

.col {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 40px;
}

/* =======================
   IMAGE (BASE)
======================= */

.image-wrapper {
  position: relative;
  width: 100%;
  max-width: 420px;
  aspect-ratio: 4 / 5;
  overflow: hidden;
  background: white;
}

.img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 1;
  transform: scale(1);
}

/* =======================
   TEXT
======================= */

.text {
  width: 100%;
  max-width: var(--text-width);

  font-size: var(--font-size);
  line-height: 1.4;

  text-align: justify;
  text-align-last: left;
}

.word {
  white-space: nowrap;
}

.char {
  display: inline-block;
}

/* =======================
   MOBILE
======================= */

@media (max-width: 768px) {
  .container {
    grid-template-columns: 1fr;
  }
}

</style>
</head>

<body>

<div class="container">

  <!-- IMAGE -->
  <div class="col">
    <div class="image-wrapper">
      <img id="imgA" class="img">
      <img id="imgB" class="img">
    </div>
  </div>

  <!-- TEXT -->
  <div class="col">
    <div id="text" class="text"></div>
  </div>

</div>

<script>

/* =======================
   IMAGES (10 future-ready)
======================= */

const images = [
  "images/image1.webp",
  "images/image2.webp"
  // ... image3.webp → image10.webp
];

/* =======================
   TEXTS
======================= */

const texts = [
  "La periferia è un linguaggio che si scrive da solo nel tempo.",
  "Il corpo digitale perde peso quando viene osservato troppo a lungo.",
  "Ogni immagine è un errore che insiste nel diventare memoria.",
  "La realtà non si interrompe ma cambia frequenza di lettura.",
  "Non esiste un inizio solo una sequenza che decide di ripetersi.",
  "Il sistema genera significato quando inizia a corrodersi."
];

/* =======================
   TIMING
======================= */

const CYCLE_TIME = 6000;   // 🔧 sync totale
const MORPH_START = 0.6;   // 🔧 quando parte morph testo

/* =======================
   STATE
======================= */

let phaseStart = performance.now();

let textIndex = 0;
let nextText = 1;

let imgIndex = 0;

let fromText = "";
let toText = "";

let chars = [];

/* =======================
   IMAGE SMATERIALIZATION
======================= */

function getNextImage() {
  let i;
  do {
    i = Math.floor(Math.random() * images.length);
  } while (i === imgIndex);
  return i;
}

function dissolveImage(nextIndex) {

  const a = document.getElementById("imgA");
  const b = document.getElementById("imgB");

  const active = a.classList.contains("active") ? a : b;
  const inactive = active === a ? b : a;

  inactive.src = images[nextIndex];

  let p = 0;

  function animate() {

    p += 0.02;

    if (p > 1) p = 1;

    /* 🔥 SMATERIALIZZAZIONE */
    active.style.opacity = 1 - p;
    active.style.filter = `blur(${p * 8}px)`;
    active.style.transform = `scale(${1 + p * 0.1})`;

    inactive.style.opacity = p;
    inactive.style.transform = `scale(${1 + (1 - p) * 0.05})`;

    if (p < 1) {
      requestAnimationFrame(animate);
    } else {

      active.classList.remove("active");
      inactive.classList.add("active");

      active.style = "";
      inactive.style = "";

      imgIndex = nextIndex;
    }
  }

  animate();
}

/* =======================
   TEXT BUILD
======================= */

function build(text) {

  const el = document.getElementById("text");
  el.innerHTML = "";

  chars = [];

  const words = text.split(" ");

  words.forEach(word => {

    const w = document.createElement("span");
    w.className = "word";

    [...word].forEach(l => {

      const c = document.createElement("span");
      c.className = "char";
      c.textContent = l;

      chars.push(c);
      w.appendChild(c);
    });

    el.appendChild(w);
    el.appendChild(document.createTextNode(" "));
  });
}

/* =======================
   NORMALIZE TEXTS
======================= */

function normalize(a, b) {

  const max = Math.max(a.length, b.length);

  while (a.length < max) a += " ";
  while (b.length < max) b += " ";

  return [a, b];
}

/* =======================
   TEXT MORPH
======================= */

function morph(t) {

  for (let i = 0; i < chars.length; i++) {

    const a = fromText[i] || " ";
    const b = toText[i] || " ";

    chars[i].textContent = (t > i / chars.length) ? b : a;
  }
}

/* =======================
   LOOP SYNC
======================= */

function loop(now) {

  const elapsed = now - phaseStart;
  const t = elapsed / CYCLE_TIME;

  /* ================= IMAGE ================= */
  if (t >= 1) {

    phaseStart = now;

    const nextImg = getNextImage();
    dissolveImage(nextImg);

    /* TEXT SWITCH */
    textIndex = nextText;
    nextText = (nextText + 1) % texts.length;

    const norm = normalize(texts[textIndex], texts[nextText]);

    fromText = norm[0];
    toText = norm[1];

    build(fromText);
  }

  /* ================= TEXT MORPH ================= */
  if (t > MORPH_START) {

    const mt = (t - MORPH_START) / (1 - MORPH_START);

    morph(mt > 1 ? 1 : mt);
  }

  requestAnimationFrame(loop);
}

/* =======================
   INIT
======================= */

function init() {

  imgIndex = Math.floor(Math.random() * images.length);

  const imgA = document.getElementById("imgA");
  imgA.src = images[imgIndex];
  imgA.classList.add("active");

  textIndex = Math.floor(Math.random() * texts.length);
  fromText = texts[textIndex];

  build(fromText);

  phaseStart = performance.now();

  requestAnimationFrame(loop);
}

init();

</script>

</body>
</html>
