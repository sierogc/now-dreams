<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root { --baseline: 12px; }

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: white;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 100vh;
}

.col {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: calc(var(--baseline) * 4);
}

/* IMAGE */
.image {
  width: 100%;
  max-width: 420px;
  aspect-ratio: 4/5;
  object-fit: cover;
}

/* TEXT */
.text {
  width: 100%;
  max-width: 520px;
  font-size: 24px;
  line-height: calc(var(--baseline) * 3);
  text-align: justify;
  text-align-last: left;

  word-break: keep-all;
  overflow-wrap: normal;
  hyphens: none;
}

/* WORD */
.word {
  white-space: nowrap;
}

.char {
  display: inline-block;
}

/* MOBILE */
@media (max-width: 768px) {
  .container {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="col">
    <img src="images/image1.webp" class="image">
  </div>

  <div class="col">
    <div id="text" class="text"></div>
  </div>

</div>

<script>

/* ---------------- TEXTS ---------------- */
const texts = [
  "La periferia è un linguaggio che si scrive da solo nel tempo.",
  "Il corpo digitale perde peso quando viene osservato troppo a lungo.",
  "Ogni immagine è un errore che insiste nel diventare memoria.",
  "La realtà non si interrompe ma cambia frequenza di lettura.",
  "Non esiste un inizio solo una sequenza che decide di ripetersi.",
  "Il sistema genera significato quando inizia a corrodersi."
];

let current = -1;
let previous = -1;

let phase = "wait";
let waitStart = performance.now();
let morphStart = 0;

const WAIT_TIME = 6000;
const MORPH_TIME = 7000;

let fromChars = [];
let toChars = [];
let charSpans = [];

/* ---------------- RANDOM ---------------- */
function getNextIndex() {
  let i;
  do {
    i = Math.floor(Math.random() * texts.length);
  } while (i === current || i === previous);
  return i;
}

/* ---------------- BUILD DOM ---------------- */
function buildDOM(text) {
  const container = document.getElementById("text");
  container.innerHTML = "";

  charSpans = [];

  const words = text.split(" ");

  words.forEach(word => {
    const wordEl = document.createElement("span");
    wordEl.className = "word";

    [...word].forEach(letter => {
      const charEl = document.createElement("span");
      charEl.className = "char";
      charEl.textContent = letter;

      charSpans.push(charEl);
      wordEl.appendChild(charEl);
    });

    container.appendChild(wordEl);
    container.appendChild(document.createTextNode(" "));
  });
}

/* ---------------- NORMALIZE ---------------- */
function normalize(a, b) {
  const max = Math.max(a.length, b.length);

  while (a.length < max) a += " ";
  while (b.length < max) b += " ";

  return [a.split(""), b.split("")];
}

/* ---------------- UPDATE ---------------- */
function updateMorph(progress) {
  for (let i = 0; i < charSpans.length; i++) {
    const from = fromChars[i] || " ";
    const to = toChars[i] || " ";

    charSpans[i].textContent =
      (progress >= (i / charSpans.length)) ? to : from;
  }
}

/* ---------------- LOOP ---------------- */
function loop(now) {

  if (phase === "wait") {
    if (now - waitStart > WAIT_TIME) {

      phase = "morph";
      morphStart = now;

      previous = current;
      current = getNextIndex();

      const [A, B] = normalize(
        texts[previous === -1 ? current : previous],
        texts[current]
      );

      fromChars = A;
      toChars = B;

      // rebuild SOLO se cambia lunghezza
      if (charSpans.length !== A.length) {
        buildDOM(A.join(""));
      }
    }
  }

  if (phase === "morph") {

    let progress = (now - morphStart) / MORPH_TIME;
    if (progress > 1) progress = 1;

    updateMorph(progress);

    if (progress === 1) {
      phase = "wait";
      waitStart = now;
    }
  }

  requestAnimationFrame(loop);
}

/* ---------------- INIT ---------------- */
function init() {
  current = getNextIndex();
  buildDOM(texts[current]);
  waitStart = performance.now();
  requestAnimationFrame(loop);
}

init();

</script>

</body>
</html>
