<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Generative Typographic System</title>

<link rel="preload" as="image" href="images/image1.webp">

<style>
:root {
  --baseline: 12px;
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: white;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  color: black;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 100vh;
}

/* COLONNE */
.col {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: calc(var(--baseline) * 4);
}

/* IMMAGINE */
.image {
  width: 100%;
  max-width: 420px;
  aspect-ratio: 4 / 5;
  object-fit: cover;
}

/* TESTO */
.text {
  width: 100%;
  max-width: 520px;

  font-size: 24px;
  line-height: calc(var(--baseline) * 3);

  text-align: justify;
  text-align-last: left;

  word-break: keep-all;
  overflow-wrap: normal;
  hyphens: none;
}

/* PAROLE */
.word {
  white-space: nowrap;
}

/* MOBILE */
@media (max-width: 768px) {
  .container {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- IMMAGINE SINISTRA -->
  <div class="col">
    <img src="images/image1.webp" class="image" />
  </div>

  <!-- TESTO DESTRA -->
  <div class="col">
    <div id="text" class="text"></div>
  </div>

</div>

<script>

/* ---------------- TESTI ---------------- */
const texts = [
  "La periferia è un linguaggio che si scrive da solo nel tempo.",
  "Il corpo digitale perde peso quando viene osservato troppo a lungo.",
  "Ogni immagine è un errore che insiste nel diventare memoria.",
  "La realtà non si interrompe ma cambia frequenza di lettura.",
  "Non esiste un inizio solo una sequenza che decide di ripetersi.",
  "Il sistema genera significato quando inizia a corrodersi."
];

/* ---------------- STATO ---------------- */
let current = -1;
let previous = -1;

let phase = "wait";
let waitStart = performance.now();
let morphStart = 0;

const WAIT_TIME = 6000;
const MORPH_TIME = 7000;

let fromText = "";
let toText = "";

/* ---------------- RANDOM ---------------- */
function getNextIndex() {
  let i;
  do {
    i = Math.floor(Math.random() * texts.length);
  } while (i === current || i === previous);
  return i;
}

/* ---------------- RENDER ---------------- */
function render(text) {
  const el = document.getElementById("text");
  el.innerHTML = "";

  const words = text.split(" ");

  words.forEach(word => {
    const span = document.createElement("span");
    span.className = "word";
    span.textContent = word;
    el.appendChild(span);
    el.appendChild(document.createTextNode(" "));
  });
}

/* ---------------- NORMALIZE ---------------- */
function normalize(a, b) {
  const max = Math.max(a.length, b.length);

  let A = a;
  let B = b;

  while (A.length < max) A += " ";
  while (B.length < max) B += " ";

  return [A, B];
}

/* ---------------- MORPH CONTINUO ---------------- */
function morph(progress) {
  let result = "";

  for (let i = 0; i < fromText.length; i++) {
    result += (progress > (i / fromText.length))
      ? toText[i]
      : fromText[i];
  }

  render(result);
}

/* ---------------- LOOP ---------------- */
function loop(now) {

  if (phase === "wait") {
    if (now - waitStart > WAIT_TIME) {

      phase = "morph";
      morphStart = now;

      previous = current;
      current = getNextIndex();

      const [A, B] = normalize(
        texts[previous === -1 ? current : previous],
        texts[current]
      );

      fromText = A;
      toText = B;
    }
  }

  if (phase === "morph") {

    let progress = (now - morphStart) / MORPH_TIME;
    if (progress > 1) progress = 1;

    morph(progress);

    if (progress === 1) {
      phase = "wait";
      waitStart = now;
    }
  }

  requestAnimationFrame(loop);
}

/* ---------------- INIT ---------------- */
function init() {
  current = getNextIndex();
  render(texts[current]);
  waitStart = performance.now();
  requestAnimationFrame(loop);
}

init();

</script>

</body>
</html>
