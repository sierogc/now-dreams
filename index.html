<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frame-Based Morph System</title>

  <link rel="preload" as="image" href="images/image1.webp">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: white;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      color: black;
    }

    .container {
      display: flex;
      width: 100vw;
      min-height: 100vh;
    }

    /* IMMAGINE SINISTRA */
    .left {
      width: 50%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px;
    }

    .left img {
      width: 100%;
      max-width: 420px;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      display: block;
    }

    /* TESTO DESTRA */
    .right {
      width: 50%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px;
    }

    .text {
      width: 80%;
      font-size: 24px;
      line-height: 1.5;
      font-weight: 400;
      text-align: justify;
      text-align-last: left;
    }

    .char {
      display: inline-block;
      white-space: pre;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .left,
      .right {
        width: 100%;
        padding: 20px;
      }

      .left img {
        max-width: 90%;
      }

      .text {
        width: 90%;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LEFT IMAGE -->
  <div class="left">
    <img src="images/image1.webp" alt="immagine progetto" />
  </div>

  <!-- RIGHT TEXT -->
  <div class="right">
    <div id="text" class="text"></div>
  </div>

</div>

<script>

/* ---------------- TEXTS ---------------- */
const texts = [
  "La periferia è un linguaggio che si scrive da solo nel tempo.",
  "Il corpo digitale perde peso quando viene osservato troppo a lungo.",
  "Ogni immagine è un errore che insiste nel diventare memoria.",
  "La realtà non si interrompe ma cambia frequenza di lettura.",
  "Non esiste un inizio solo una sequenza che decide di ripetersi.",
  "Il sistema genera significato quando inizia a corrodersi."
];

let currentIndex = -1;
let previousIndex = -1;

/* ---------------- STATE MACHINE ---------------- */
let phase = "wait"; // wait | morph
let waitStart = performance.now();

let morphStart = 0;
const WAIT_TIME = 6000;
const MORPH_TIME = 2200; // durata transizione

let oldText = "";
let newText = "";

/* ---------------- UTILS ---------------- */
function getNextIndex() {
  let i;
  do {
    i = Math.floor(Math.random() * texts.length);
  } while (i === currentIndex || i === previousIndex);
  return i;
}

/* ---------------- INIT TEXT ---------------- */
function renderText(text) {
  const el = document.getElementById("text");
  el.innerHTML = "";

  [...text].forEach(letter => {
    const span = document.createElement("span");
    span.className = "char";
    span.textContent = letter;
    el.appendChild(span);
  });
}

/* ---------------- FRAME MORPH ---------------- */
function updateMorph(progress) {
  const chars = document.querySelectorAll(".char");
  const target = [...newText];

  chars.forEach((el, i) => {
    if (Math.random() < progress) {
      el.textContent = target[i] || " ";
    }
  });
}

/* ---------------- LOOP FRAME-BASED ---------------- */
function loop(now) {

  if (phase === "wait") {

    if (now - waitStart > WAIT_TIME) {

      // start morph
      phase = "morph";
      morphStart = now;

      oldText = texts[currentIndex];
      previousIndex = currentIndex;
      currentIndex = getNextIndex();
      newText = texts[currentIndex];

      renderText(oldText);
    }

  }

  if (phase === "morph") {

    let progress = (now - morphStart) / MORPH_TIME;
    if (progress > 1) progress = 1;

    updateMorph(progress);

    if (progress === 1) {
      phase = "wait";
      waitStart = now;
    }
  }

  requestAnimationFrame(loop);
}

/* ---------------- START ---------------- */
function init() {
  currentIndex = getNextIndex();
  renderText(texts[currentIndex]);

  waitStart = performance.now();
  requestAnimationFrame(loop);
}

init();

</script>

</body>
</html>
